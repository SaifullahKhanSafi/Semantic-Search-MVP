version: '3.8'

services:
  # --- THE FASTAPI BACKEND ---
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app 
      - ~/.cache/huggingface:/root/.cache/huggingface 
    environment:
      - CHROMA_HOST=chroma-server
      - CHROMA_PORT=8000
    depends_on:
      - chroma-server

  # --- THE VECTOR DATABASE ---
  chroma-server:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - ./chroma_db_data:/chroma/chroma